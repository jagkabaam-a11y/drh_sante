<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion | DRH - Ministère de la Santé</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #000080; /* Bleu Nuit */
      --accent-color: #FF4500;  /* Orange Médical */
      --bg-light: #f4f7f9;
      --text-dark: #333;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #ADD8E6 0%, #87CEEB 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      position: relative;
      overflow: hidden; /* Empêche le défilement dû aux images flottantes */
    }

    /* --- ÉLÉMENTS FLOTTANTS D'ARRIÈRE-PLAN --- */
    .floating-bg {
      position: absolute;
      font-size: 20rem;
      color: var(--primary-color);
      opacity: 0.05; /* Très léger pour l'élégance */
      z-index: 0;
      pointer-events: none;
      user-select: none;
    }

    .bg-left { bottom: -50px; left: -50px; transform: rotate(-15deg); }
    .bg-right { top: -50px; right: -50px; transform: rotate(15deg); }

    /* --- CARTE DE CONNEXION --- */
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
      z-index: 10; /* Devant les images flottantes */
    }

    .logo-placeholder {
      width: 80px;
      height: 80px;
      background: var(--bg-light);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
      color: var(--primary-color);
      font-size: 2.5em;
    }

    h1 { color: var(--primary-color); font-size: 1.4rem; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; }
    h2 { color: #666; font-size: 0.9rem; margin-bottom: 30px; font-weight: 400; border-bottom: 1px solid #eee; padding-bottom: 15px; }

    .input-group {
      text-align: left;
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-dark);
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 38px;
      color: var(--primary-color);
      opacity: 0.6;
    }

    .input-group input {
      width: 100%;
      padding: 12px 12px 12px 42px;
      border: 2px solid #e1e1e1;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .input-group input:focus {
      border-color: var(--primary-color);
      outline: none;
      box-shadow: 0 0 8px rgba(0,0,128,0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover { background: var(--accent-color); transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    button:disabled { background: #ccc; cursor: not-allowed; }

    #msg {
      margin-top: 20px;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      display: none;
    }

    .error-msg { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; display: block !important; }
    .success-msg { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block !important; }

    .footer-text { margin-top: 25px; font-size: 0.7rem; color: #888; line-height: 1.4; }
  </style>
</head>
<body>

<i class="fas fa-microscope floating-bg bg-left"></i>
<i class="fas fa-hand-holding-medical floating-bg bg-right"></i>

<div class="login-card">
  <div class="logo-placeholder">
    <i class="fas fa-user-md"></i>
  </div>
  
  <h1>MINISTÈRE DE LA SANTÉ</h1>
  <h2>Direction des Ressources Humaines</h2>

  <form id="loginForm">
    <div class="input-group">
      <label>Email Professionnel</label>
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" required placeholder="nom@sante.gouv.cd">
    </div>

    <div class="input-group">
      <label>Mot de Passe</label>
      <i class="fas fa-lock"></i>
      <input type="password" id="password" required placeholder="••••••••">
    </div>

    <button type="submit" id="btnConnecter">
      <i class="fas fa-sign-in-alt"></i> Se connecter
    </button>
  </form>

  <div id="msg"></div>

  <div class="footer-text">
    &copy; 2026 Secrétariat Général à la Santé <br> 
    Direction des Ressources Humaines <br>
    République Démocratique du Congo
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = "https://ngsvrffgjksmmzyebptl.supabase.co";
  const supabaseKey = "sb_publishable_KLWH2wcZAqj3KHfkvzDTCg_oAEx9KS5";
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btnConnecter");

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Vérification...';
    msg.className = "";
    msg.innerText = "";

    try {
      const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password,
      });

      if (authError) throw authError;

      const { data: roleData, error: roleError } = await supabaseClient
        .from('user_roles')
        .select('role')
        .eq('user_id', authData.user.id)
        .maybeSingle();

      if (roleError || !roleData) {
        await supabaseClient.auth.signOut();
        throw new Error("Accès refusé : Aucun rôle attribué à ce compte.");
      }

      sessionStorage.setItem("role", roleData.role);
      msg.className = "success-msg";
      msg.innerText = "Connexion réussie ! Redirection...";

      setTimeout(() => {
        const routes = {
          "admin": "admin.html",
          "entree": "entree.html",
          "sortie": "sortie.html",
          "dispatcher1": "dispatcher.html",
          "dispatcher2": "dispatcher.html"
        };
        window.location.href = routes[roleData.role] || "login.html";
      }, 1000);

    } catch (err) {
      msg.className = "error-msg";
      msg.innerText = err.message === "Invalid login credentials" 
        ? "Email ou mot de passe incorrect." 
        : err.message;
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
    }
  });
</script>

</body>
</html>
