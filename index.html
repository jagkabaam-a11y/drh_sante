<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion opérateur</title>
  <link rel="stylesheet" href="style.css"> <!-- ton style global -->
</head>
<body>
  <h2>Connexion</h2>

  <!-- Formulaire connexion -->
  <form id="loginForm">
    <h3>Se connecter</h3>
    <label>Email :</label>
    <input type="email" id="loginEmail" required>
    <br>
    <label>Mot de passe :</label>
    <input type="password" id="loginPassword" required>
    <br>
    <button type="submit">Connexion</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ngsvrffgjksmmzyebptl.supabase.co";
    const supabaseKey = "sb_publishable_KLWH2wcZAqj3KHfkvzDTCg_oAEx9KS5";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // ----- Connexion -----
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert("Erreur connexion : " + error.message);
      } else {
        alert("Connexion réussie !");
        window.location.href = "liste.html"; // redirection vers la liste
      }
    });

    // ----- Vérification de session -----
    (async () => {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (user) {
        console.log("Utilisateur déjà connecté :", user.email);
        // Redirection automatique si déjà connecté
        window.location.href = "liste.html";
      }
    })();
  </script>
</body>
</html>
