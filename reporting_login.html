<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Accès Reporting Admin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #f9f9f9;
      text-align: center;
    }
    input {
      width: 80%;
      padding: 8px;
      margin: 10px 0;
    }
    button {
      padding: 8px 15px;
      margin: 5px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <header>
    <h1>Accès Reporting</h1>
  </header>

  <div class="login-container">
    <form id="reportingLoginForm">
      <label for="password">Mot de passe administrateur :</label><br>
      <input type="password" id="password" required><br>
      <button type="submit">Connexion</button>
    </form>

    <!-- Bouton retour à la liste -->
    <button onclick="window.location.href='liste.html'"> Retour à la liste</button>
  </div>

  <script>
    document.getElementById("reportingLoginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const pwd = document.getElementById("password").value;

      // Définir ton mot de passe en dur ici
      const adminPassword = "JackSecret2026"; 

      if (pwd === adminPassword) {
        sessionStorage.setItem("reportingAuth", "true");
        window.location.href = "reporting.html";
      } else {
        alert("Mot de passe incorrect !");
      }
    });
  </script>
</body>
</html>
