<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Nouvel enregistrement / Modification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- En-tête institutionnel -->
  <header>
    <h1 class="ministere">MINISTERE DE LA SANTE</h1>
    <h2 class="direction">Direction des Ressources Humaines</h2>
    <h3>FORMULAIRE D'ENREGISTREMENT</h3>
  </header>

  <div class="form-container">
    <form id="problemeForm">
      <label for="objet">Objet :</label>
      <input type="text" id="objet" required>

      <label for="nom_complet">Nom complet :</label>
      <input type="text" id="nom_complet" required>

      <label for="fonction">Fonction :</label>
      <input type="text" id="fonction">

      <label for="grade">Grade :</label>
      <input type="text" id="grade">

      <label for="numero_enregistrement">N° enregistrement :</label>
      <input type="text" id="numero_enregistrement" required>

      <label for="telephone">Téléphone :</label>
      <input type="text" id="telephone">

      <label for="bureau_traitement">Bureau du traitement :</label>
      <select id="bureau_traitement" required>
        <option value="">Choisir...</option>
        <option value="element paie">Element Paie</option>
        <option value="carriere ADM">Carrière ADM</option>
        <option value="carriere PROSANTE">Carrière PROSANTE</option>
        <option value="autres">Autres</option>
      </select>

      <label for="division">Division :</label>
      <select id="division" required>
        <option value="">Choisir...</option>
        <option value="capital humain">Capital Humain</option>
        <option value="Affaire Social">Affaire Social</option>
        <option value="PERF">PERF</option>
        <option value="Qualité de vie">Qualité de vie</option>
      </select>

      <label for="agent_charge_de_traiter">Agent chargé de traiter :</label>
      <input type="text" id="agent_charge_de_traiter">

      <label for="etat_avancement">État d’avancement :</label>
      <select id="etat_avancement" required>
        <option value="">Choisir...</option>
        <option value="déjà traité">Résolus</option>
        <option value="traitement en cours">En cours</option>
        <option value="non traité">Non traités</option>
      </select>

      <button type="submit"> Enregistrer</button>
      <a href="liste.html">⬅ Retour à la liste</a>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ngsvrffgjksmmzyebptl.supabase.co";
    const supabaseKey = "sb_publishable_KLWH2wcZAqj3KHfkvzDTCg_oAEx9KS5";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Récupérer l'ID depuis l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const recordId = urlParams.get("id");

    (async () => {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user) {
        alert("Vous devez être connecté !");
        window.location.href = "login.html";
        return;
      }

      // Vérifier le rôle de l'utilisateur
      const { data: roleData } = await supabaseClient
        .from("user_roles")
        .select("role")
        .eq("user_id", user.id)
        .single();

      if (roleData && roleData.role === "superviseur") {
        // Désactiver tous les champs du formulaire
        document.querySelectorAll("#problemeForm input, #problemeForm select, #problemeForm button[type='submit']")
          .forEach(el => el.disabled = true);

        // Ajouter un message d'information
        const msg = document.createElement("p");
        msg.textContent = "Accès en lecture seule : en tant que superviseur, vous pouvez consulter les données mais pas les modifier.";
        msg.style.color = "red";
        msg.style.fontWeight = "bold";
        document.querySelector(".form-container").prepend(msg);
        return; // Stopper ici pour éviter toute logique d'édition/ajout
      }

      // Si on est en mode modification
      if (recordId) {
        const { data, error } = await supabaseClient
          .from("problemes_agents")
          .select("*")
          .eq("id", recordId)
          .eq("user_id", user.id)
          .single();

        if (error) {
          alert("Erreur chargement : " + error.message);
        } else if (data) {
          // Pré-remplir les champs
          document.getElementById("objet").value = data.objet || "";
          document.getElementById("nom_complet").value = data.nom_complet || "";
          document.getElementById("fonction").value = data.fonction || "";
          document.getElementById("grade").value = data.grade || "";
          document.getElementById("numero_enregistrement").value = data.numero_enregistrement || "";
          document.getElementById("telephone").value = data.telephone || "";
          document.getElementById("bureau_traitement").value = data.bureau_traitement || "";
          document.getElementById("division").value = data.division || "";
          document.getElementById("agent_charge_de_traiter").value = data.agent_charge_de_traiter || "";
          document.getElementById("etat_avancement").value = data.etat_avancement || "";
        }
      }

      // Soumission du formulaire
      document.getElementById("problemeForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
          objet: document.getElementById("objet").value.trim(),
          nom_complet: document.getElementById("nom_complet").value.trim(),
          fonction: document.getElementById("fonction").value.trim(),
          grade: document.getElementById("grade").value.trim(),
          numero_enregistrement: document.getElementById("numero_enregistrement").value.trim(),
          telephone: document.getElementById("telephone").value.trim(),
          bureau_traitement: document.getElementById("bureau_traitement").value,
          division: document.getElementById("division").value,
          agent_charge_de_traiter: document.getElementById("agent_charge_de_traiter").value.trim(),
          etat_avancement: document.getElementById("etat_avancement").value,
          date_reception: new Date(),
          user_id: user.id
        };

        let error;
        if (recordId) {
          // Mode modification
          ({ error } = await supabaseClient
            .from("problemes_agents")
            .update(payload)
            .eq("id", recordId)
            .eq("user_id", user.id));
        } else {
          // Mode ajout
          ({ error } = await supabaseClient
            .from("problemes_agents")
            .insert([payload]));
        }

        if (error) {
          alert("Erreur : " + error.message);
        } else {
          alert("Problème enregistré avec succès !");
          window.location.href = "liste.html";
if (roleData && roleData.role === "superviseur") {
  document.querySelectorAll("#problemeForm input, #problemeForm select, #problemeForm button[type='submit']")
    .forEach(el => el.disabled = true);

  const msg = document.createElement("p");
  msg.textContent = "Accès en lecture seule : en tant que superviseur, vous pouvez consulter les données mais pas les modifier.";
  msg.style.color = "red";
  msg.style.fontWeight = "bold";
  document.querySelector(".form-container").prepend(msg);
}

        }
      });
    })();
  </script>
</body>
</html>
