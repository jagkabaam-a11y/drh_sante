<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Sortie & Archivage - DRH MSP</title>
  <style>
    :root {
      --primary: #000080;
      --secondary: #FF4500;
      --success: #27ae60;
      --gold: #FFD700;
      --danger: #e74c3c;
      --light-blue: #ADD8E6;
    }

    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: var(--light-blue) url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Flag_of_the_Democratic_Republic_of_the_Congo.svg/1200px-Flag_of_the_Democratic_Republic_of_the_Congo.svg.png') no-repeat center center fixed;
      background-size: 40%; 
      background-blend-mode: overlay;
      margin: 0; padding: 20px;
      display: none; 
    }

    .container { 
      max-width: 950px; margin: 20px auto; background: rgba(255, 255, 255, 0.98); 
      padding: 40px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
      border-top: 10px solid var(--primary); position: relative;
    }

    #logoutBtn {
      position: absolute; right: 20px; top: 20px; background-color: var(--danger);
      color: white; border: none; padding: 10px 18px; cursor: pointer; border-radius: 6px; font-weight: bold;
    }

    header { text-align: center; border-bottom: 3px double #ccc; margin-bottom: 30px; padding-bottom: 20px; }
    .ministere { color: var(--primary); font-size: 1.8em; font-weight: bold; margin: 0; }
    .direction { color: #333; font-size: 1.3em; margin: 5px 0; border-bottom: 3px solid var(--gold); display: inline-block; }
    .page-title { color: var(--secondary); font-weight: bold; margin-top: 15px; font-size: 1.2em; text-transform: uppercase; }

    .search-box { background: #f0f7ff; padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 2px solid var(--primary); }
    input, select { width: 100%; padding: 15px; border: 2px solid #ccc; border-radius: 10px; font-size: 1.1em; box-sizing: border-box; margin-top: 8px; background: white; }
    .btn-search { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-top: 10px; }

    #infoSection { display: none; margin-top: 30px; padding: 25px; border: 3px solid var(--gold); border-radius: 12px; background: white; }
    .agent-summary { background: #eef4ff; padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 10px solid var(--primary); }

    .file-upload-zone { background: #fffdf0; border: 2px dashed var(--gold); padding: 20px; border-radius: 10px; margin: 20px 0; text-align: center; }
    #previewContainer { margin-top: 15px; display: none; border: 1px solid #ddd; padding: 10px; background: #eee; border-radius: 8px; }
    #imagePreview { max-width: 100%; max-height: 250px; border-radius: 5px; }

    .btn-save { width: 100%; background: var(--success); color: white; padding: 22px; font-size: 1.4em; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-top: 15px; }
    #loader { display: none; color: var(--primary); font-weight: bold; margin: 15px 0; text-align: center; }
    
    .step-box { margin-bottom: 15px; padding: 15px; border-left: 5px solid var(--gold); background: #f9f9f9; border-radius: 0 10px 10px 0; }
  </style>
</head>
<body>

<div class="container">
  <button id="logoutBtn">Déconnexion</button>

  <header>
    <p style="font-weight: bold; margin: 0; color: #555;">REPUBLIQUE DEMOCRATIQUE DU CONGO</p>
    <h1 class="ministere">MINISTERE DE LA SANTE PUBLIQUE</h1>
    <h2 class="direction">Direction des Ressources Humaines</h2>
    <div class="page-title">SORTIE ET ARCHIVAGE NUMÉRIQUE</div>
  </header>

  <div class="search-box">
    <label><b>🔍 RECHERCHER LE DOSSIER :</b></label>
    <input type="text" id="searchNom" placeholder="Nom de l'agent ou N° d'enregistrement...">
    <button class="btn-search" id="searchBtn">CONSULTER LE REGISTRE</button>
    <div id="searchResults" style="margin-top:15px;"></div>
  </div>

  <div id="infoSection">
    <div class="agent-summary">
      <strong style="color:var(--primary)">DOSSIER SÉLECTIONNÉ :</strong> <br>
      Nom : <span id="nom_complet" style="font-size: 1.4em; font-weight: bold;"></span> <br>
      Objet : <span id="objet"></span> | N° : <b id="numero_enregistrement"></b>
    </div>

    <form id="sortieForm">
      <label><b>Date du mouvement :</b></label>
      <input type="date" id="date_sortie" required>

      <div class="step-box">
        <label><b>1. Sélectionner le Circuit :</b></label>
        <select id="circuitSelect" required onchange="actualiserActions(this.value)">
          <option value="">-- Choisir le circuit --</option>
          <option value="SG">CIRCUIT SECRÉTARIAT GÉNÉRAL (SG)</option>
          <option value="DRH">TRAITEMENT INTERNE DRH</option>
        </select>
      </div>

      <div class="step-box" id="actionBox" style="display:none;">
        <label><b>2. Choisir l'Action à faire :</b></label>
        <select id="statut" required onchange="verifierSousEtape(this.value)">
          <option value="">-- Choisir l'action --</option>
        </select>
      </div>

      <div class="step-box" id="sousActionBox" style="display:none; background: #eef9f2; border-left-color: var(--success);">
        <label><b>3. Étape après réception du document signé :</b></label>
        <select id="sous_statut">
          <option value="">-- Choisir l'orientation du dossier --</option>
          <option value="Enregistrement pour notification">Enregistrement pour notification</option>
          <option value="Classé pour archives">Classé définitivement pour archives</option>
        </select>
      </div>

      <label><b>Note / Observation :</b></label>
      <input type="text" id="traitement_transmission" placeholder="Précisez les détails ici..." required>

      <div class="file-upload-zone">
        <label style="font-weight: bold; color: var(--primary);"> CHARGER LE SCAN (Preuve ou Document signé) :</label>
        <input type="file" id="document_scanne" accept=".pdf, .jpg, .jpeg, .png">
        <div id="previewContainer">
          <img id="imagePreview" style="display:none;">
          <div id="pdfPreview" style="display:none; font-weight:bold; color:var(--primary);"> Document PDF prêt</div>
        </div>
      </div>

      <div id="zoneLivraison" style="display:none; margin-top:15px; padding:15px; border:2px solid var(--success); border-radius:10px; background:#f0fff0;">
        <label><b>N° de décharge ou Référence de remise :</b></label>
        <input type="text" id="num_decharge" placeholder="Saisir la référence du retrait...">
      </div>

      <div id="loader">⏳ Veuillez patienter svp...</div>
      <button type="submit" class="btn-save" id="btnValider"> VALIDER ET CLÔTURER LE MOUVEMENT</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = supabase.createClient("https://ngsvrffgjksmmzyebptl.supabase.co", "sb_publishable_KLWH2wcZAqj3KHfkvzDTCg_oAEx9KS5");

  function checkAuth() {
    const role = sessionStorage.getItem("role");
    if (!role || (role !== "sortie" && role !== "admin")) {
      window.location.href = "login.html";
    } else { document.body.style.display = "block"; }
  }
  checkAuth();

  let recordId = null;

  function actualiserActions(circuit) {
    const actionBox = document.getElementById("actionBox");
    const actionSelect = document.getElementById("statut");
    const sousActionBox = document.getElementById("sousActionBox");
    
    actionSelect.innerHTML = '<option value="">-- Choisir l\'action --</option>';
    actionBox.style.display = circuit ? "block" : "none";
    sousActionBox.style.display = "none";

    if (circuit === "SG") {
      actionSelect.innerHTML += `
        <option value="Transmis au SG">Envoyer au Secrétariat Général (SG)</option>
        <option value="Signé (Retour SG)">Réceptionner Retour du SG (Signé)</option>
      `;
    } else if (circuit === "DRH") {
      actionSelect.innerHTML += `
        <option value="Copié / Enregistré">Dossier traité en interne</option>
        <option value="Livré à l'intéressé">Remise finale à l'agent</option>
        <option value="Archivé">Archivage numérique final</option>
      `;
    }
  }

  function verifierSousEtape(valeur) {
    const sousActionBox = document.getElementById("sousActionBox");
    const zoneLivraison = document.getElementById("zoneLivraison");
    
    // Affiche le sous-menu uniquement pour le retour SG
    sousActionBox.style.display = (valeur === "Signé (Retour SG)") ? "block" : "none";
    
    // Affiche la décharge uniquement pour la livraison directe à l'intéressé
    zoneLivraison.style.display = (valeur === "Livré à l'intéressé") ? "block" : "none";
  }

  document.getElementById("searchBtn").onclick = async () => {
    const query = document.getElementById("searchNom").value.trim();
    if (!query) return;
    const { data } = await supabaseClient.from("problemes_agents").select("*").or(`nom_complet.ilike.%${query}%,numero_enregistrement.ilike.%${query}%`);
    const resDiv = document.getElementById("searchResults");
    resDiv.innerHTML = "";
    if (data && data.length > 0) {
      data.forEach(d => {
        const row = document.createElement("div");
        row.style = "background:#fff; padding:10px; border:1px solid #ddd; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;";
        row.innerHTML = `<span><b>${d.nom_complet}</b> (N° ${d.numero_enregistrement})</span> 
        <button type="button" style="background:var(--success); color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer;" onclick="selectionner('${d.id}', '${d.nom_complet.replace(/'/g, "\\'")}', '${d.objet ? d.objet.replace(/'/g, "\\'") : 'Sans objet'}', '${d.numero_enregistrement}')">SÉLECTIONNER</button>`;
        resDiv.appendChild(row);
      });
    } else { resDiv.innerHTML = "<p style='color:red;'>Aucun dossier trouvé.</p>"; }
  };

  function selectionner(id, nom, objet, num) {
    recordId = id;
    document.getElementById("nom_complet").textContent = nom;
    document.getElementById("objet").textContent = objet;
    document.getElementById("numero_enregistrement").textContent = num;
    document.getElementById("infoSection").style.display = "block";
    document.getElementById("searchResults").innerHTML = "";
  }

  document.getElementById("sortieForm").onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btnValider");
    const loader = document.getElementById("loader");
    btn.disabled = true; loader.style.display = "block";

    let finalUrl = null;
    const fileInput = document.getElementById("document_scanne");
    if (fileInput.files[0]) {
      const file = fileInput.files[0];
      const fileName = `SORTIE_${Date.now()}_${file.name}`;
      await supabaseClient.storage.from('scans').upload(fileName, file);
      const { data: link } = supabaseClient.storage.from('scans').getPublicUrl(fileName);
      finalUrl = link.publicUrl;
    }

    const statutPrincipal = document.getElementById("statut").value;
    const sousStatut = document.getElementById("sous_statut").value;
    const noteInitiale = document.getElementById("traitement_transmission").value;
    const numDecharge = document.getElementById("num_decharge").value;
    
    let statutFinal = statutPrincipal;
    if (statutPrincipal === "Signé (Retour SG)" && sousStatut) {
      statutFinal = "Signé - " + sousStatut;
    }

    const updateData = {
      date_sortie: document.getElementById("date_sortie").value,
      traitement_transmission: numDecharge ? `${noteInitiale} (Réf décharge: ${numDecharge})` : noteInitiale,
      statut: statutFinal,
      scan_sortie_url: finalUrl
    };

    const { error } = await supabaseClient.from("problemes_agents").update(updateData).eq("id", recordId);
    
    if (!error) {
      alert("Dossier mis à jour !");
      window.location.href = "liste.html";
    } else {
      alert("Erreur: " + error.message);
      btn.disabled = false; loader.style.display = "none";
    }
  };

  document.getElementById("document_scanne").onchange = function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById("imagePreview");
    if (file && file.type.startsWith("image/")) {
      const reader = new FileReader();
      reader.onload = (ev) => { preview.src = ev.target.result; preview.style.display = "block"; };
      reader.readAsDataURL(file);
    }
  };

  document.getElementById("logoutBtn").onclick = () => { sessionStorage.clear(); window.location.href = "login.html"; };
</script>
</body>
</html>
