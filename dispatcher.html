<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Système Dispatcher - DRH MSP</title>
  <style>
    :root {
      --primary: #000080;
      --secondary: #FF4500;
      --success: #27ae60;
      --gold: #FFD700;
      --light-blue: #ADD8E6;
      --danger: #e74c3c;
    }

    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: var(--light-blue) url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Flag_of_the_Democratic_Republic_of_the_Congo.svg/1200px-Flag_of_the_Democratic_Republic_of_the_Congo.svg.png') no-repeat center center fixed;
      background-size: 40%; 
      background-blend-mode: overlay;
      margin: 0;
      padding: 20px;
    }

    .container { 
      max-width: 950px; 
      margin: 20px auto; 
      background: rgba(255, 255, 255, 0.97); 
      padding: 40px; 
      border-radius: 15px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
      border-top: 10px solid var(--primary);
      position: relative;
    }

    #logoutBtn {
      position: absolute;
      right: 20px;
      top: 20px;
      background-color: var(--danger);
      color: white;
      border: none;
      padding: 10px 18px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.3s;
    }

    header { text-align: center; border-bottom: 3px double #ccc; margin-bottom: 30px; padding-bottom: 20px; }
    .ministere { color: var(--primary); font-size: 1.8em; font-weight: bold; margin: 0; }
    .direction { color: #333; font-size: 1.3em; margin: 5px 0; border-bottom: 3px solid var(--gold); display: inline-block; }
    .page-title { color: var(--secondary); font-weight: bold; margin-top: 15px; font-size: 1.2em; text-transform: uppercase; }

    .search-box { background: #f0f7ff; padding: 35px; border-radius: 12px; margin-bottom: 30px; border: 2px solid var(--primary); }
    input[type="text"] { width: 100%; padding: 20px; border: 2px solid #aaa; border-radius: 10px; font-size: 1.3em; box-sizing: border-box; }
    
    .btn-search { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.2em; cursor: pointer; margin-top: 15px; }
    .result-item { background: white; padding: 20px; margin-top: 15px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; }
    
    #assignZone { display: none; margin-top: 35px; padding: 35px; border: 4px solid var(--gold); border-radius: 15px; background: #fff; }
    .agent-summary { background: #eef4ff; padding: 20px; border-radius: 10px; margin-bottom: 25px; border-left: 10px solid var(--primary); }
    
    select { width: 100%; padding: 18px; border-radius: 10px; border: 2px solid #ccc; font-size: 1.2em; margin-top: 10px; }
    .btn-save { width: 100%; background: var(--success); color: white; padding: 20px; margin-top: 30px; font-size: 1.4em; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>

<div class="container">
  <button id="logoutBtn">Déconnexion</button>

  <header>
    <p style="font-weight: bold; margin: 0; color: #555;">REPUBLIQUE DEMOCRATIQUE DU CONGO</p>
    <h1 class="ministere">MINISTERE DE LA SANTE PUBLIQUE</h1>
    <h2 class="direction">Direction des Ressources Humaines</h2>
    <div class="page-title" id="titrePage">CIRCUIT INTERNE DES DOSSIERS</div>
    <p id="infoRole" style="margin-top: 12px; font-weight: bold; color: var(--primary);"></p>
  </header>

  <div class="search-box">
    <label>🔍 RECHERCHE (Nom, Matricule ou N° Enregistrement):</label>
    <input type="text" id="searchInput" placeholder="Saisir les informations de l'agent...">
    <button class="btn-search" onclick="rechercherDossier()">LANCER LA RECHERCHE</button>
    <div id="results"></div>
  </div>

  <div id="assignZone">
    <div class="agent-summary">
      <strong style="color:var(--primary);">DOSSIER SÉLECTIONNÉ :</strong> <br>
      <span id="agentNom" style="font-size: 1.5em; font-weight: bold;"></span> <br>
      <span style="font-size: 1.1em;">Registre N° : <b id="agentNum"></b></span>
    </div>

    <form id="dispatchForm">
      <div id="divD1" style="display:none;">
        <label><b>ORIENTATION DU DOSSIER :</b></label>
        <select id="actionD1">
          <option value="">-- Choisir une action --</option>
          <optgroup label="DESCENDRE (Affectation)">
            <option value="VERS_DIVISION">Envoyer à une Division</option>
          </optgroup>
          <optgroup label="RECEPTIONNER (Fin de circuit interne)">
            <option value="RECU_DIRECTION">Confirmer la réception finale à la Direction</option>
          </optgroup>
        </select>

        <div id="selectDiv" style="margin-top:15px; display:none;">
          <label>Choisir la Division destinataire :</label>
          <select id="fieldDivision">
            <option value="">-- Choisir la Division --</option>
            <option value="Division Capital Humain">Division Capital Humain</option>
            <option value="Division Action Sociale">Division Action Sociale</option>
            <option value="Division Gestion des Compétences">Division Gestion des Compétences</option>
          </select>
        </div>
      </div>

      <div id="divD2" style="display:none;">
        <label><b>MOUVEMENT DU DOSSIER :</b></label>
        <select id="actionD2">
          <option value="">-- Choisir une action --</option>
          <optgroup label="DESCENDRE (Affectation)">
            <option value="VERS_BUREAU">Affecter à un Bureau</option>
          </optgroup>
          <optgroup label="REMONTER (Retour vers Direction)">
            <option value="RETOUR_DIVISION">Dossier traité : Remonter à la Division</option>
            <option value="RETOUR_DIRECTION">Transmettre à la Direction (Sans passé par la Division)</option>
          </optgroup>
        </select>

        <div id="selectBur" style="margin-top:15px; display:none;">
          <label>Choisir le Bureau de traitement :</label>
          <select id="fieldBureau">
            <option value="">-- Choisir le Bureau --</option>
            </select>
        </div>
      </div>

      <button type="submit" class="btn-save">VALIDER LE MOUVEMENT</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = supabase.createClient("https://ngsvrffgjksmmzyebptl.supabase.co", "sb_publishable_KLWH2wcZAqj3KHfkvzDTCg_oAEx9KS5");

  const role = sessionStorage.getItem("role");
  let currentDossierId = null;

  // Configuration des bureaux par division
  const bureauxParDivision = {
    "Division Capital Humain": [
      "Bureau Carrière Administrative",
      "Bureau Carrière Prosante",
      "Bureau Eléments Paie"
    ],
    "Division Action Sociale": [
      "Bureau Qualité de vie", 
      "Bureau Assistance Sociale",
      "Bureau Relation Prof, Activités Culturelles"
    ],
    "Division Gestion des Compétences": [
      "Bureau Gestion prévisionnelle des emplois",
      "Bureau Suivie et Evaluation des Compétences"
    ]
  };

  if (!role) window.location.href = "login.html";
  document.getElementById("infoRole").innerText = "AGENT : " + role.toUpperCase();

  if (role === "dispatcher1") {
    document.getElementById("divD1").style.display = "block";
  } else if (role === "dispatcher2") {
    document.getElementById("divD2").style.display = "block";
  } else if (role === "admin") {
    document.getElementById("divD1").style.display = "block";
    document.getElementById("divD2").style.display = "block";
  }

  document.getElementById("actionD1")?.addEventListener("change", e => {
    document.getElementById("selectDiv").style.display = (e.target.value === "VERS_DIVISION") ? "block" : "none";
  });
  document.getElementById("actionD2")?.addEventListener("change", e => {
    document.getElementById("selectBur").style.display = (e.target.value === "VERS_BUREAU") ? "block" : "none";
  });

  async function rechercherDossier() {
    const q = document.getElementById("searchInput").value.trim();
    if(!q) return;

    const { data } = await supabaseClient
      .from("problemes_agents")
      .select("*")
      .or(`nom_complet.ilike.%${q}%,numero_enregistrement.ilike.%${q}%,matricule.ilike.%${q}%`)
      .limit(5);

    const resDiv = document.getElementById("results");
    resDiv.innerHTML = "";
    
    if (data && data.length > 0) {
      data.forEach(d => {
        resDiv.innerHTML += `
          <div class="result-item">
            <span><b>${d.nom_complet}</b> (Mat: ${d.matricule || 'N/A'})<br>Statut actuel: ${d.statut}</span>
            <button class="btn-select" onclick="ouvrirFormulaire('${d.id}', '${d.nom_complet}', '${d.numero_enregistrement}')">SÉLECTIONNER</button>
          </div>`;
      });
    } else {
      resDiv.innerHTML = "<p style='color:red; text-align:center;'>Aucun dossier trouvé.</p>";
    }
  }

  async function ouvrirFormulaire(id, nom, num) {
    currentDossierId = id;
    document.getElementById("agentNom").innerText = nom;
    document.getElementById("agentNum").innerText = num;
    document.getElementById("assignZone").style.display = "block";
    document.getElementById("results").innerHTML = "";

    // Filtrage dynamique des bureaux pour le Dispatcher 2
    const { data } = await supabaseClient.from("problemes_agents").select("division").eq("id", id).single();
    const selectBur = document.getElementById("fieldBureau");
    selectBur.innerHTML = '<option value="">-- Choisir le Bureau --</option>';

    if (data && data.division && bureauxParDivision[data.division]) {
      bureauxParDivision[data.division].forEach(b => {
        let opt = document.createElement("option");
        opt.value = b; opt.textContent = b;
        selectBur.appendChild(opt);
      });
    }
  }

  document.getElementById("dispatchForm").onsubmit = async (e) => {
    e.preventDefault();
    let updates = {};

    if (role === "dispatcher1" || role === "admin") {
      const action = document.getElementById("actionD1").value;
      if (action === "VERS_DIVISION") {
        updates.division = document.getElementById("fieldDivision").value;
        updates.statut = "En attente à la Division";
      } else if (action === "RECU_DIRECTION") {
        updates.statut = "Prêt pour transmission SG";
      }
    } 
    
    if (role === "dispatcher2" || role === "admin") {
      const action = document.getElementById("actionD2").value;
      if (action === "VERS_BUREAU") {
        updates.bureau_traitement = document.getElementById("fieldBureau").value;
        updates.statut = "En cours au Bureau";
      } else if (action === "RETOUR_DIVISION") {
        updates.statut = "Traité (Retour Division)";
      } else if (action === "RETOUR_DIRECTION") {
        updates.statut = "Transmis à la Direction";
      }
    }

    if (Object.keys(updates).length === 0) return alert("Action requise !");

    const { error } = await supabaseClient.from("problemes_agents").update(updates).eq("id", currentDossierId);

    if (error) alert("Erreur : " + error.message);
    else {
      alert("Mouvement enregistré !");
      window.location.reload();
    }
  };

  document.getElementById("logoutBtn").addEventListener("click", () => {
    sessionStorage.clear();
    window.location.href = "login.html";
	
  });
</script>
</body>
</html>
