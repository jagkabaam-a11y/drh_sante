<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Système Dispatcher - DRH MSP</title>
  <style>
    :root {
      --primary: #000080;
      --secondary: #FF4500;
      --success: #27ae60;
      --gold: #FFD700;
      --light-blue: #ADD8E6;
      --danger: #e74c3c;
    }

    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      background: var(--light-blue) url('https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Flag_of_the_Democratic_Republic_of_the_Congo.svg/1200px-Flag_of_the_Democratic_Republic_of_the_Congo.svg.png') no-repeat center center fixed;
      background-size: 40%; 
      background-blend-mode: overlay;
      margin: 0;
      padding: 20px;
    }

    .container { 
      max-width: 950px; 
      margin: 20px auto; 
      background: rgba(255, 255, 255, 0.97); 
      padding: 40px; 
      border-radius: 15px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
      border-top: 10px solid var(--primary);
      position: relative; /* Pour positionner le bouton logout */
    }

    /* Bouton Déconnexion */
    #logoutBtn {
      position: absolute;
      right: 20px;
      top: 20px;
      background-color: var(--danger);
      color: white;
      border: none;
      padding: 10px 18px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.3s;
    }

    #logoutBtn:hover {
      background-color: #c0392b;
      transform: scale(1.05);
    }

    header { 
      text-align: center; 
      border-bottom: 3px double #ccc; 
      margin-bottom: 30px; 
      padding-bottom: 20px;
    }

    .ministere { color: var(--primary); font-size: 1.8em; font-weight: bold; margin: 0; }
    .direction { color: #333; font-size: 1.3em; margin: 5px 0; border-bottom: 3px solid var(--gold); display: inline-block; }
    .page-title { color: var(--secondary); font-weight: bold; margin-top: 15px; font-size: 1.2em; text-transform: uppercase; }

    .search-box { 
      background: #f0f7ff; 
      padding: 35px; 
      border-radius: 12px; 
      margin-bottom: 30px; 
      border: 2px solid var(--primary);
    }

    .search-box label {
      display: block;
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 1.4em;
      color: var(--primary);
    }

    input[type="text"] { 
      width: 100%; 
      padding: 22px; 
      border: 2px solid #aaa; 
      border-radius: 10px; 
      font-size: 1.5em; 
      box-sizing: border-box;
      background: white;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
    }

    .btn-search { 
      width: 100%; 
      padding: 20px; 
      background: var(--primary); 
      color: white; 
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1.3em;
      cursor: pointer;
      margin-top: 15px;
      transition: background 0.3s;
    }

    .btn-search:hover { background: var(--secondary); }

    .result-item { 
      background: white; 
      padding: 20px; 
      margin-top: 15px; 
      border: 1px solid #ddd; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .btn-select { 
      background: var(--success); 
      color: white; 
      padding: 12px 25px; 
      border: none; 
      border-radius: 8px; 
      font-weight: bold; 
      cursor: pointer;
    }

    #assignZone { 
      display: none; 
      margin-top: 35px; 
      padding: 35px; 
      border: 4px solid var(--gold); 
      border-radius: 15px; 
      background: #fff;
    }

    .agent-summary {
      background: #eef4ff;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 25px;
      border-left: 10px solid var(--primary);
    }

    select { 
      width: 100%; 
      padding: 20px; 
      border-radius: 10px; 
      border: 2px solid #ccc; 
      font-size: 1.3em;
      margin-top: 10px;
      background: #fff;
    }

    .btn-save { 
      width: 100%; 
      background: var(--success); 
      color: white; 
      padding: 22px; 
      margin-top: 30px; 
      font-size: 1.5em; 
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
    }
  </style>
</head>
<body>

<div class="container">
  <button id="logoutBtn">Déconnexion </button>

  <header>
    <p style="font-weight: bold; margin: 0; color: #555;">REPUBLIQUE DEMOCRATIQUE DU CONGO</p>
    <h1 class="ministere">MINISTERE DE LA SANTE PUBLIQUE</h1>
    <h2 class="direction">Direction des Ressources Humaines</h2>
    <div class="page-title" id="titrePage">GESTION DES AFFECTATIONS</div>
    <p id="infoRole" style="margin-top: 12px; font-weight: bold; color: var(--primary);"></p>
  </header>

  <div class="search-box">
    <label for="searchInput">🔍 RECHERCHE DE DOSSIER:</label>
    <input type="text" id="searchInput" placeholder="Nom de l'agent ou Numéro d'enregistrement...">
    <button class="btn-search" onclick="rechercherDossier()">RECHERCHE</button>
    <div id="results"></div>
  </div>

  <div id="assignZone">
    <div class="agent-summary">
      <strong style="color:var(--primary); font-size: 0.9em;">DOSSIER EN COURS :</strong> <br>
      <span id="agentNom" style="font-size: 1.6em; font-weight: bold;"></span> <br>
      <span style="font-size: 1.1em;">N° d'enregistrement : <b id="agentNum"></b></span>
    </div>

    <form id="dispatchForm">
      <div id="divD1" style="display:none;">
        <label><b>AFFECTER À LA DIVISION :</b></label>
        <select id="fieldDivision">
          <option value="">-- Choisir la Division --</option>
          <option value="Division Capital Humain">Division Capital Humain</option>
          <option value="Division Action Sociale">Division Action Sociale</option>
          <option value="Division Gestion et Développement des Compétences">Division Gestion et Développement des Compétences</option>
          <option value="Secrétariat de la Direction">Secrétariat de la Direction</option>
        </select>
      </div>

      <div id="divD2" style="display:none;">
        <label><b>AFFECTER AU BUREAU DE TRAITEMENT :</b></label>
        <select id="fieldBureau">
          <option value="">-- Choisir le Bureau --</option>
          <option value="Bureau Carrière Administrative">Bureau Carrière Administrative</option>
          <option value="Bureau Carrière Prosante">Bureau Carrière Prosante</option>
          <option value="Bureau Eléments Paie">Bureau Eléments Paie</option>
          <option value="Bureau Qualité de vie">Bureau Qualité de vie</option>
	  <option value="Bureau Assistance Sociale">Bureau Assistance Sociale</option>
	  <option value="Bureau Relation Prof, Activités Cultureles Sport et Ludique">Bureau Relation Prof, Activités Cultureles Sport et Ludique</option>
	  <option value="Bureau Gestion prévisionnelle des emplois">Bureau Gestion prévisionnelle des emplois</option>
 	  <option value="Bureau Suivie et Evaluation des Compétences">Bureau Suivie et Evaluation des Compétences</option>
        </select>
      </div>

      <button type="submit" class="btn-save"> VALIDER ET METTRE À JOUR LA LISTE</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = supabase.createClient("https://ngsvrffgjksmmzyebptl.supabase.co", "sb_publishable_KLWH2wcZAqj3KHfkvzDTCg_oAEx9KS5");

  const role = sessionStorage.getItem("role");
  let currentDossierId = null;

  if (!role) window.location.href = "login.html";
  
  document.getElementById("infoRole").innerText = "AGENT CONNECTÉ : " + role.toUpperCase();

  // Logique du bouton de déconnexion
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    const confirmation = confirm("Voulez-vous vraiment vous déconnecter ?");
    if (confirmation) {
      await supabaseClient.auth.signOut();
      sessionStorage.clear(); // On vide les rôles stockés
      window.location.href = "login.html";
    }
  });

  if (role === "dispatcher1") {
    document.getElementById("divD1").style.display = "block";
    document.getElementById("titrePage").innerText = "DISPATCHING NIVEAU 1 (DIRECTION -> DIVISION)";
  } else if (role === "dispatcher2") {
    document.getElementById("divD2").style.display = "block";
    document.getElementById("titrePage").innerText = "DISPATCHING NIVEAU 2 (DIVISION -> BUREAU)";
  }

  async function rechercherDossier() {
    const query = document.getElementById("searchInput").value.trim();
    if(!query) return;

    const { data, error } = await supabaseClient
      .from("problemes_agents")
      .select("id, nom_complet, numero_enregistrement")
      .or(`nom_complet.ilike.%${query}%,numero_enregistrement.ilike.%${query}%`)
      .limit(5);

    const resDiv = document.getElementById("results");
    resDiv.innerHTML = "";
    
    if (data && data.length > 0) {
      data.forEach(d => {
        resDiv.innerHTML += `
          <div class="result-item">
            <span><b style="font-size:1.3em">${d.nom_complet}</b> <br> Registre N° ${d.numero_enregistrement}</span>
            <button class="btn-select" onclick="ouvrirFormulaire('${d.id}', '${d.nom_complet}', '${d.numero_enregistrement}')">SÉLECTIONNER</button>
          </div>`;
      });
    } else {
      resDiv.innerHTML = "<p style='color:red; font-weight:bold; padding:15px; text-align:center;'>Aucun dossier correspondant dans la base de données.</p>";
    }
  }

  function ouvrirFormulaire(id, nom, num) {
    currentDossierId = id;
    document.getElementById("agentNom").innerText = nom;
    document.getElementById("agentNum").innerText = num;
    document.getElementById("assignZone").style.display = "block";
    document.getElementById("results").innerHTML = "";
    document.getElementById("assignZone").scrollIntoView({ behavior: 'smooth' });
  }

  document.getElementById("dispatchForm").onsubmit = async (e) => {
    e.preventDefault();
    let updates = { statut: "Affecté" };

    if (role === "dispatcher1") {
      const val = document.getElementById("fieldDivision").value;
      if (!val) return alert("Sélectionnez une division !");
      updates.division = val;
    } else {
      const val = document.getElementById("fieldBureau").value;
      if (!val) return alert("Sélectionnez un bureau !");
      updates.bureau_traitement = val;
    }

    const { error } = await supabaseClient
      .from("problemes_agents")
      .update(updates)
      .eq("id", currentDossierId);

    if (error) {
      alert("Erreur technique : " + error.message);
    } else {
      alert("Dossier mis à jour avec succès dans le registre.");
      window.location.href = "liste.html";
    }
  };
</script>
</body>
</html>
